// ======================== THREE.JS SETUP ========================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a12, 0.006);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 60);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 10;
controls.maxDistance = 150;

// Bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.85);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// Ambient light
scene.add(new THREE.AmbientLight(0x334466, 0.8));
const pLight = new THREE.PointLight(0xc5960c, 0.6, 200);
pLight.position.set(0, 40, 0);
scene.add(pLight);

// ======================== BUILD NETWORK ========================
const nodeMeshes = new Map(); // id -> mesh
const nodeLabels = new Map(); // id -> CSS2DObject
const edgeLines = []; // {line, from, to}
let selectedNode = null;

function hexToThreeColor(hex) {
  return new THREE.Color(hex);
}

function layoutNodes() {
  const insideNodes = nodesData.filter(n => n.location === 'inside_sa');
  const outsideNodes = nodesData.filter(n => n.location === 'outside_sa');

  const insideMedia = insideNodes.filter(n => n.type === 'media_house');
  const insideJourn = insideNodes.filter(n => n.type === 'journalist');
  const outsideMedia = outsideNodes.filter(n => n.type === 'media_house');
  const outsideJourn = outsideNodes.filter(n => n.type === 'journalist');

  function placeRing(nodes, baseRadius, yOffset, startAngle=0) {
    const count = nodes.length;
    nodes.forEach((n, i) => {
      const angle = startAngle + (i / count) * Math.PI * 2;
      const jitter = (Math.random() - 0.5) * 2;
      n._x = Math.cos(angle) * (baseRadius + jitter);
      n._y = yOffset + (Math.random() - 0.5) * 2;
      n._z = Math.sin(angle) * (baseRadius + jitter);
    });
  }

  placeRing(insideMedia, 12, 2, 0);
  placeRing(insideJourn, 22, 0, 0.3);
  placeRing(outsideMedia, 36, 2, 0.1);
  placeRing(outsideJourn, 46, 0, 0.5);
}

function buildScene() {
  // Clear existing
  nodeMeshes.forEach(m => { scene.remove(m); });
  nodeLabels.forEach(l => { scene.remove(l); });
  edgeLines.forEach(e => { scene.remove(e.line); });
  nodeMeshes.clear();
  nodeLabels.clear();
  edgeLines.length = 0;

  layoutNodes();

  // Create spheres
  nodesData.forEach(n => {
    const radius = 0.5 + (n.weight || 3) * 0.18;
    const geo = new THREE.SphereGeometry(radius, 32, 32);
    const col = hexToThreeColor(n.color || '#888');
    const mat = new THREE.MeshStandardMaterial({
      color: col,
      emissive: col,
      emissiveIntensity: 0.3 + (n.weight || 3) * 0.05,
      roughness: 0.3,
      metalness: 0.1
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(n._x, n._y, n._z);
    mesh.userData = { nodeId: n.id, nodeData: n };
    scene.add(mesh);
    nodeMeshes.set(n.id, mesh);

    // Label
    const labelDiv = document.createElement('div');
    labelDiv.className = 'node-label';
    labelDiv.innerHTML = `<div class="nl-name">${n.name}</div>${n.type==='journalist'?`<div class="nl-house">${n.media_house||''}</div>`:''}`;
    const label = new CSS2DObject(labelDiv);
    label.position.set(0, radius + 0.6, 0);
    mesh.add(label);
    nodeLabels.set(n.id, label);
  });

  // Create edges
  const edgeSet = new Set();
  nodesData.forEach(n => {
    (n.connections || []).forEach(cid => {
      const key = [n.id, cid].sort().join('|');
      if (edgeSet.has(key)) return;
      edgeSet.add(key);
      const fromMesh = nodeMeshes.get(n.id);
      const toMesh = nodeMeshes.get(cid);
      if (!fromMesh || !toMesh) return;

      const points = [fromMesh.position.clone(), toMesh.position.clone()];
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 });
      const line = new THREE.Line(geo, mat);
      scene.add(line);
      edgeLines.push({ line, from: n.id, to: cid });
    });
  });

  // Concentric ring guides (subtle)
  [12, 22, 36, 46].forEach(r => {
    const pts = [];
    for (let i = 0; i <= 64; i++) {
      const a = (i / 64) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.cos(a) * r, -1, Math.sin(a) * r));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.03 });
    scene.add(new THREE.Line(geo, mat));
  });

  buildLegend();
  updateStats();
}

// ======================== LEGEND ========================
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';

  const insideHouses = [...new Set(nodesData.filter(n => n.location === 'inside_sa' && n.type === 'media_house').map(n => n.name))];
  const outsideHouses = [...new Set(nodesData.filter(n => n.location === 'outside_sa' && n.type === 'media_house').map(n => n.name))];

  function addSection(title, houses) {
    const h3 = document.createElement('h3');
    h3.textContent = title;
    el.appendChild(h3);

    houses.forEach(name => {
      const color = MEDIA_COLORS[name] || '#888';
      const div = document.createElement('div');
      div.className = 'legend-item';
      div.innerHTML = `<span class="legend-swatch" style="background:${color}"></span>
        <input type="checkbox" checked data-house="${name}">
        <label>${name}</label>`;
      div.querySelector('input').addEventListener('change', e => toggleMediaHouse(name, e.target.checked));
      el.appendChild(div);
    });
  }

  addSection('Inside South Africa', insideHouses);
  addSection('Outside South Africa', outsideHouses);
}

function toggleMediaHouse(name, visible) {
  nodesData.forEach(n => {
    const isMatch = n.name === name || n.media_house === name;
    if (!isMatch) return;
    const mesh = nodeMeshes.get(n.id);
    const label = nodeLabels.get(n.id);
    if (mesh) mesh.visible = visible;
    if (label) label.visible = visible;
  });
  edgeLines.forEach(e => {
    const fromD = nodesData.find(n => n.id === e.from);
    const toD = nodesData.find(n => n.id === e.to);
    const fromM = nodeMeshes.get(e.from);
    const toM = nodeMeshes.get(e.to);
    if (fromM && toM) e.line.visible = fromM.visible && toM.visible;
  });
}

// ======================== INTERACTION ========================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
let hoveredMesh = null;

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  nodeMeshes.forEach(m => { if (m.visible) meshes.push(m); });
  const hits = raycaster.intersectObjects(meshes);

  if (hits.length > 0) {
    const mesh = hits[0].object;
    if (hoveredMesh !== mesh) {
      hoveredMesh = mesh;
      const d = mesh.userData.nodeData;
      showTooltip(d, e.clientX, e.clientY);
    } else {
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY + 16) + 'px';
    }
    document.body.style.cursor = 'pointer';
  } else {
    hoveredMesh = null;
    tooltip.style.display = 'none';
    document.body.style.cursor = 'default';
  }
}

function showTooltip(d, x, y) {
  let html = `<div class="tt-name">${d.name}</div>`;
  if (d.type === 'journalist') html += `<div class="tt-house">${d.media_house}</div>`;
  html += `<div class="tt-meta"><span class="tt-flag">${d.flag||''}</span> ${d.country}</div>`;
  if (d.topics) html += `<div class="tt-topics">${d.topics.join(' · ')}</div>`;
  if (d.desc) html += `<div class="tt-desc">${d.desc}</div>`;
  if (d.articles && d.articles.length) {
    html += '<div class="tt-articles">';
    d.articles.forEach(a => { html += `<a href="${a.u}" target="_blank">${a.t}</a>`; });
    html += '</div>';
  }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (x + 16) + 'px';
  tooltip.style.top = (y + 16) + 'px';
}

function onClick(e) {
  if (e.target.closest('#legend') || e.target.closest('#title-bar') || e.target.closest('#side-panel') || e.target.closest('#modal-overlay')) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  nodeMeshes.forEach(m => { if (m.visible) meshes.push(m); });
  const hits = raycaster.intersectObjects(meshes);

  if (hits.length > 0) {
    const mesh = hits[0].object;
    const d = mesh.userData.nodeData;
    selectNode(d, mesh);
  } else {
    deselectAll();
  }
}

function selectNode(d, mesh) {
  selectedNode = d.id;
  const connSet = new Set(d.connections || []);
  connSet.add(d.id);

  // Dim non-connected
  nodeMeshes.forEach((m, id) => {
    const label = nodeLabels.get(id);
    if (connSet.has(id)) {
      m.material.opacity = 1;
      if (label) label.element.classList.remove('dimmed');
    } else {
      m.material.opacity = 0.15;
      m.material.transparent = true;
      if (label) label.element.classList.add('dimmed');
    }
  });

  edgeLines.forEach(e => {
    const connected = (e.from === d.id || e.to === d.id);
    e.line.material.opacity = connected ? 0.5 : 0.02;
  });

  // Zoom to node
  const target = mesh.position.clone();
  const dir = camera.position.clone().sub(target).normalize();
  const dest = target.clone().add(dir.multiplyScalar(15));
  animateCamera(dest, target);

  // Side panel
  showSidePanel(d);
}

function deselectAll() {
  selectedNode = null;
  nodeMeshes.forEach((m, id) => {
    m.material.opacity = 1;
    m.material.transparent = false;
    const label = nodeLabels.get(id);
    if (label) label.element.classList.remove('dimmed');
  });
  edgeLines.forEach(e => { e.line.material.opacity = 0.08; });
  closeSidePanel();
}

function animateCamera(destPos, destTarget) {
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const dur = 800;
  const start = performance.now();

  function step(t) {
    const elapsed = t - start;
    const progress = Math.min(elapsed / dur, 1);
    const ease = 1 - Math.pow(1 - progress, 3);

    camera.position.lerpVectors(startPos, destPos, ease);
    controls.target.lerpVectors(startTarget, destTarget, ease);
    controls.update();

    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function showSidePanel(d) {
  const el = document.getElementById('sp-content');
  let html = `<div class="sp-name">${d.flag||''} ${d.name}</div>`;
  if (d.type === 'journalist') html += `<div class="sp-house">${d.media_house}</div>`;
  else html += `<div class="sp-house">${d.type === 'media_house' ? 'Media House' : ''}</div>`;

  html += `<div class="sp-section">Location</div><div class="sp-text">${d.country}</div>`;

  if (d.topics) {
    html += `<div class="sp-section">Topics</div><div>`;
    d.topics.forEach(t => { html += `<span class="sp-tag">${t}</span>`; });
    html += '</div>';
  }

  if (d.desc) html += `<div class="sp-section">Profile</div><div class="sp-text">${d.desc}</div>`;

  if (d.articles && d.articles.length) {
    html += '<div class="sp-section">Articles</div>';
    d.articles.forEach(a => { html += `<a class="sp-link" href="${a.u}" target="_blank">${a.t}</a>`; });
  }

  if (d.connections && d.connections.length) {
    html += '<div class="sp-section">Connections</div>';
    d.connections.forEach(cid => {
      const cn = nodesData.find(n => n.id === cid);
      if (cn) html += `<div class="sp-text" style="margin:2px 0;cursor:pointer;color:#6ea8f0" onclick="window._selectById('${cid}')">${cn.name}</div>`;
    });
  }

  el.innerHTML = html;
  document.getElementById('side-panel').classList.add('open');
}

window._selectById = function(id) {
  const d = nodesData.find(n => n.id === id);
  const m = nodeMeshes.get(id);
  if (d && m) selectNode(d, m);
};

window.closeSidePanel = function() {
  document.getElementById('side-panel').classList.remove('open');
};

// ======================== TOOLBAR ========================
window.exportJSON = function() {
  const modal = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  box.innerHTML = `<h3>Export Network JSON</h3>
    <textarea id="export-text" readonly>${JSON.stringify(nodesData, null, 2)}</textarea>
    <div class="modal-btns">
      <button onclick="navigator.clipboard.writeText(document.getElementById('export-text').value);this.textContent='Copied!'">Copy</button>
      <button onclick="document.getElementById('modal-overlay').classList.remove('show')">Close</button>
    </div>`;
  modal.classList.add('show');
};

window.showImport = function() {
  const modal = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  box.innerHTML = `<h3>Import Network JSON</h3>
    <textarea id="import-text" placeholder="Paste JSON array here..."></textarea>
    <div class="modal-btns">
      <button class="primary" onclick="importData()">Import</button>
      <button onclick="document.getElementById('modal-overlay').classList.remove('show')">Cancel</button>
    </div>`;
  modal.classList.add('show');
};

window.importData = function() {
  try {
    const data = JSON.parse(document.getElementById('import-text').value);
    if (Array.isArray(data)) {
      nodesData.length = 0;
      data.forEach(d => nodesData.push(d));
      buildScene();
      document.getElementById('modal-overlay').classList.remove('show');
    }
  } catch(e) { alert('Invalid JSON: ' + e.message); }
};

window.resetView = function() {
  deselectAll();
  animateCamera(new THREE.Vector3(0, 30, 60), new THREE.Vector3(0, 0, 0));
};

function updateStats() {
  const j = nodesData.filter(n => n.type === 'journalist').length;
  const m = nodesData.filter(n => n.type === 'media_house').length;
  document.getElementById('stats').textContent = `${j} journalists · ${m} media houses · ${edgeLines.length} connections`;
}

// ======================== ANIMATION LOOP ========================
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.005;

  // Gentle floating
  nodeMeshes.forEach((mesh, id) => {
    const d = mesh.userData.nodeData;
    if (!d) return;
    mesh.position.y = d._y + Math.sin(time + d._x * 0.5) * 0.3;
  });

  // Update edge positions
  edgeLines.forEach(e => {
    const fromM = nodeMeshes.get(e.from);
    const toM = nodeMeshes.get(e.to);
    if (fromM && toM) {
      const positions = e.line.geometry.attributes.position.array;
      positions[0] = fromM.position.x; positions[1] = fromM.position.y; positions[2] = fromM.position.z;
      positions[3] = toM.position.x; positions[4] = toM.position.y; positions[5] = toM.position.z;
      e.line.geometry.attributes.position.needsUpdate = true;
    }
  });

  controls.update();
  composer.render();
  labelRenderer.render(scene, camera);
}

// ======================== EVENTS ========================
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ======================== INIT ========================
buildScene();
animate();
</script>
