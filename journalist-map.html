/* ============ THREE.JS SETUP ============ */
const W=window.innerWidth, H=window.innerHeight;
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x08080f,0.005);
const camera=new THREE.PerspectiveCamera(55,W/H,0.1,1000);
camera.position.set(0,30,65);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const labelR=new CSS2DRenderer();
labelR.setSize(W,H);
labelR.domElement.style.position='absolute';
labelR.domElement.style.top='0';
labelR.domElement.style.pointerEvents='none';
document.getElementById('canvas-container').appendChild(labelR.domElement);

const ctrl=new OrbitControls(camera,renderer.domElement);
ctrl.enableDamping=true;ctrl.dampingFactor=0.05;ctrl.minDistance=8;ctrl.maxDistance=160;

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W,H),0.5,0.4,0.88));
composer.addPass(new OutputPass());

scene.add(new THREE.AmbientLight(0x334466,0.7));
const pl=new THREE.PointLight(0xc5960c,0.5,200);pl.position.set(0,40,0);scene.add(pl);

/* ============ BUILD ============ */
const meshes=new Map(),labels=new Map(),edges=[];
let selId=null;

function layout(){
  const iM=DATA.filter(n=>n.loc==='inside_sa'&&n.type==='media_house');
  const iJ=DATA.filter(n=>n.loc==='inside_sa'&&n.type==='journalist');
  const oM=DATA.filter(n=>n.loc==='outside_sa'&&n.type==='media_house');
  const oJ=DATA.filter(n=>n.loc==='outside_sa'&&n.type==='journalist');
  function ring(arr,r,y,off=0){arr.forEach((n,i)=>{
    const a=off+(i/arr.length)*Math.PI*2;const j=(Math.random()-0.5)*1.5;
    n._x=Math.cos(a)*(r+j);n._y=y+(Math.random()-0.5)*1.5;n._z=Math.sin(a)*(r+j);
  });}
  ring(iM,11,2,0);ring(iJ,21,0,0.25);ring(oM,35,2,0.08);ring(oJ,47,0,0.4);
}

function build(){
  meshes.forEach(m=>scene.remove(m));labels.forEach(l=>scene.remove(l));
  edges.forEach(e=>scene.remove(e.line));meshes.clear();labels.clear();edges.length=0;
  layout();

  DATA.forEach(n=>{
    const r=0.4+(n.w||3)*0.18;
    const c=new THREE.Color(n.color||'#888');
    const mesh=new THREE.Mesh(
      new THREE.SphereGeometry(r,32,32),
      new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.25+(n.w||3)*0.04,roughness:0.3,metalness:0.1})
    );
    mesh.position.set(n._x,n._y,n._z);
    mesh.userData={id:n.id,d:n};
    scene.add(mesh);meshes.set(n.id,mesh);

    // Label with logo icon
    const el=document.createElement('div');el.className='nl';
    const mh=n.type==='journalist'?n.media_house:n.name;
    const lu=logoUrl(mh);const fu=logoFallback(mh);
    el.innerHTML=`<img class="nl-i" src="${lu}" onerror="this.src='${fu}'" alt="">
      <div class="nl-n">${n.name}</div>${n.type==='journalist'?`<div class="nl-h">${n.media_house}</div>`:''}`;
    const lbl=new CSS2DObject(el);
    lbl.position.set(0,r+0.8,0);
    mesh.add(lbl);labels.set(n.id,lbl);
  });

  // Edges
  const eset=new Set();
  DATA.forEach(n=>{(n.conns||[]).forEach(cid=>{
    const k=[n.id,cid].sort().join('|');if(eset.has(k))return;eset.add(k);
    const fm=meshes.get(n.id),tm=meshes.get(cid);if(!fm||!tm)return;
    const g=new THREE.BufferGeometry().setFromPoints([fm.position.clone(),tm.position.clone()]);
    const line=new THREE.Line(g,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.06}));
    scene.add(line);edges.push({line,from:n.id,to:cid});
  });});

  // Rings
  [11,21,35,47].forEach(r=>{
    const pts=[];for(let i=0;i<=80;i++){const a=(i/80)*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*r,-1.5,Math.sin(a)*r));}
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.025})));
  });

  buildLegend();
  document.getElementById('st').textContent=
    `${DATA.filter(n=>n.type==='journalist').length} journalists · ${DATA.filter(n=>n.type==='media_house').length} media houses · ${edges.length} connections`;
}

/* ============ LEGEND ============ */
function buildLegend(){
  const el=document.getElementById('legend');el.innerHTML='';
  const iH=[...new Set(DATA.filter(n=>n.loc==='inside_sa'&&n.type==='media_house').map(n=>n.name))];
  const oH=[...new Set(DATA.filter(n=>n.loc==='outside_sa'&&n.type==='media_house').map(n=>n.name))];
  function sec(title,arr){
    const h=document.createElement('h3');h.textContent=title;el.appendChild(h);
    arr.forEach(name=>{
      const c=COL[name]||'#888';const lu=logoUrl(name);const fu=logoFallback(name);
      const d=document.createElement('div');d.className='li';
      d.innerHTML=`<span class="li-sw" style="background:${c}"></span>
        <input type="checkbox" checked data-h="${name}">
        <img src="${lu}" onerror="this.src='${fu}'" alt="">
        <label>${name}</label>`;
      d.querySelector('input').addEventListener('change',e=>toggleH(name,e.target.checked));
      el.appendChild(d);
    });
  }
  sec('Inside South Africa',iH);sec('Outside South Africa',oH);
}

function toggleH(name,vis){
  DATA.forEach(n=>{
    if(n.name!==name&&n.media_house!==name)return;
    const m=meshes.get(n.id),l=labels.get(n.id);
    if(m)m.visible=vis;if(l)l.visible=vis;
  });
  edges.forEach(e=>{
    const fm=meshes.get(e.from),tm=meshes.get(e.to);
    if(fm&&tm)e.line.visible=fm.visible&&tm.visible;
  });
}

/* ============ INTERACTION ============ */
const rc=new THREE.Raycaster(),mouse=new THREE.Vector2();
const tt=document.getElementById('tt');
let hov=null;

function onMM(e){
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  rc.setFromCamera(mouse,camera);
  const arr=[];meshes.forEach(m=>{if(m.visible)arr.push(m);});
  const hits=rc.intersectObjects(arr);
  if(hits.length){
    const m=hits[0].object;
    if(hov!==m){hov=m;showTT(m.userData.d,e.clientX,e.clientY);}
    else{tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY+14)+'px';}
    document.body.style.cursor='pointer';
  }else{hov=null;tt.style.display='none';document.body.style.cursor='default';}
}

function showTT(d,x,y){
  const mh=d.type==='journalist'?d.media_house:d.name;
  const lu=logoUrl(mh),fu=logoFallback(mh),fl=flagUrl(d.cc);
  let h=`<div class="tt-top"><img class="tt-logo" src="${lu}" onerror="this.src='${fu}'" alt="">
    <div class="tt-info"><div class="tt-name">${d.name}</div>`;
  if(d.type==='journalist')h+=`<div class="tt-house">${d.media_house}</div>`;
  h+=`</div></div>`;
  h+=`<div class="tt-loc"><img src="${fl}" alt="">${d.country}</div>`;
  if(d.topics)h+=`<div class="tt-topics">${d.topics.join(' · ')}</div>`;
  if(d.desc)h+=`<div class="tt-desc">${d.desc}</div>`;
  if(d.arts&&d.arts.length){h+='<div class="tt-arts">';d.arts.forEach(a=>{h+=`<a href="${a.u}" target="_blank">${a.t}</a>`;});h+='</div>';}
  tt.innerHTML=h;tt.style.display='block';
  // Position with bounds check
  const tx=Math.min(x+14,innerWidth-340),ty=Math.min(y+14,innerHeight-300);
  tt.style.left=tx+'px';tt.style.top=ty+'px';
}

function onClick(e){
  if(e.target.closest('#legend')||e.target.closest('#title-bar')||e.target.closest('#sp')||e.target.closest('#mo'))return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  rc.setFromCamera(mouse,camera);
  const arr=[];meshes.forEach(m=>{if(m.visible)arr.push(m);});
  const hits=rc.intersectObjects(arr);
  if(hits.length){const d=hits[0].object.userData.d;selNode(d,hits[0].object);}
  else desel();
}

function selNode(d,mesh){
  selId=d.id;const cs=new Set(d.conns||[]);cs.add(d.id);
  meshes.forEach((m,id)=>{
    const l=labels.get(id);
    if(cs.has(id)){m.material.opacity=1;m.material.transparent=false;if(l)l.element.classList.remove('dim');}
    else{m.material.opacity=0.12;m.material.transparent=true;if(l)l.element.classList.add('dim');}
  });
  edges.forEach(e=>{e.line.material.opacity=(e.from===d.id||e.to===d.id)?0.45:0.015;});
  // Zoom
  const t=mesh.position.clone(),dir=camera.position.clone().sub(t).normalize();
  animCam(t.clone().add(dir.multiplyScalar(14)),t);
  showPanel(d);
}

function desel(){
  selId=null;
  meshes.forEach((m,id)=>{m.material.opacity=1;m.material.transparent=false;labels.get(id)?.element.classList.remove('dim');});
  edges.forEach(e=>{e.line.material.opacity=0.06;});
  closePanel();
}

function animCam(dp,dt){
  const sp=camera.position.clone(),st=ctrl.target.clone();
  const dur=700,t0=performance.now();
  function step(t){
    const p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,3);
    camera.position.lerpVectors(sp,dp,e);ctrl.target.lerpVectors(st,dt,e);ctrl.update();
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function showPanel(d){
  const mh=d.type==='journalist'?d.media_house:d.name;
  const lu=logoUrl(mh),fu=logoFallback(mh),fl=flagUrl(d.cc);
  let h=`<div class="sp-top"><img class="sp-logo" src="${lu}" onerror="this.src='${fu}'" alt="">
    <div><div class="sp-nm">${d.name}</div></div><img class="sp-flag" src="${fl}" alt=""></div>`;
  if(d.type==='journalist')h+=`<div class="sp-mh">${d.media_house}</div>`;
  else h+=`<div class="sp-mh">Media House</div>`;
  h+=`<div class="sp-sec">Location</div><div class="sp-txt">${d.country}</div>`;
  if(d.topics){h+=`<div class="sp-sec">Topics</div><div>`;d.topics.forEach(t=>{h+=`<span class="sp-tag">${t}</span>`;});h+=`</div>`;}
  if(d.desc)h+=`<div class="sp-sec">Profile</div><div class="sp-txt">${d.desc}</div>`;
  if(d.arts&&d.arts.length){h+=`<div class="sp-sec">Articles</div>`;d.arts.forEach(a=>{h+=`<a class="sp-lnk" href="${a.u}" target="_blank">${a.t}</a>`;});}
  if(d.conns&&d.conns.length){
    h+=`<div class="sp-sec">Connections</div>`;
    d.conns.forEach(cid=>{const cn=DATA.find(n=>n.id===cid);
      if(cn)h+=`<div class="sp-conn" onclick="window._sel('${cid}')">${cn.name}</div>`;
    });
  }
  document.getElementById('spc').innerHTML=h;
  document.getElementById('sp').classList.add('open');
}

window._sel=id=>{const d=DATA.find(n=>n.id===id),m=meshes.get(id);if(d&&m)selNode(d,m);};
window.closePanel=()=>document.getElementById('sp').classList.remove('open');

/* ============ TOOLBAR ============ */
window.doExport=()=>{
  const mo=document.getElementById('mo'),mb=document.getElementById('mb');
  mb.innerHTML=`<h3>Export Network JSON</h3><textarea id="etx" readonly>${JSON.stringify(DATA,null,2)}</textarea>
    <div class="mb-b"><button onclick="navigator.clipboard.writeText(document.getElementById('etx').value);this.textContent='Copied!'">Copy</button>
    <button onclick="document.getElementById('mo').classList.remove('show')">Close</button></div>`;
  mo.classList.add('show');
};
window.doImport=()=>{
  const mo=document.getElementById('mo'),mb=document.getElementById('mb');
  mb.innerHTML=`<h3>Import Network JSON</h3><textarea id="itx" placeholder="Paste JSON array..."></textarea>
    <div class="mb-b"><button class="pr" onclick="impData()">Import</button>
    <button onclick="document.getElementById('mo').classList.remove('show')">Cancel</button></div>`;
  mo.classList.add('show');
};
window.impData=()=>{try{const d=JSON.parse(document.getElementById('itx').value);
  if(Array.isArray(d)){DATA.length=0;d.forEach(x=>DATA.push(x));build();document.getElementById('mo').classList.remove('show');}
}catch(e){alert('Invalid JSON: '+e.message);}};
window.doReset=()=>{desel();animCam(new THREE.Vector3(0,30,65),new THREE.Vector3(0,0,0));};

/* ============ ANIMATE ============ */
let t=0;
function animate(){
  requestAnimationFrame(animate);t+=0.004;
  meshes.forEach((m,id)=>{const d=m.userData.d;if(d)m.position.y=d._y+Math.sin(t+d._x*0.4)*0.25;});
  edges.forEach(e=>{
    const fm=meshes.get(e.from),tm=meshes.get(e.to);
    if(fm&&tm){const p=e.line.geometry.attributes.position.array;
      p[0]=fm.position.x;p[1]=fm.position.y;p[2]=fm.position.z;
      p[3]=tm.position.x;p[4]=tm.position.y;p[5]=tm.position.z;
      e.line.geometry.attributes.position.needsUpdate=true;}
  });
  ctrl.update();composer.render();labelR.render(scene,camera);
}

/* ============ EVENTS ============ */
addEventListener('mousemove',onMM);
addEventListener('click',onClick);
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);labelR.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

/* ============ INIT ============ */
build();animate();
</script>
</body>
</html>
