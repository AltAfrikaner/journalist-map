/* ═══ COMPUTE WEIGHTS ═══ */
function compW(){const w={};DATA.forEach(n=>{w[S(n.id)]=0;});
DATA.forEach(n=>{(n.conns||[]).forEach(c=>{w[S(n.id)]=(w[S(n.id)]||0)+1;w[S(c)]=(w[S(c)]||0)+1;});});
DATA.forEach(n=>{n.cw=w[S(n.id)]||0;});}
compW();

/* ═══ THREE.JS ═══ */
const W=innerWidth,H=innerHeight;
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x08080f,0.003);
const camera=new THREE.PerspectiveCamera(55,W/H,0.1,2000);camera.position.set(0,45,100);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
document.getElementById('cv').appendChild(renderer.domElement);

const labelR=new CSS2DRenderer();labelR.setSize(W,H);
labelR.domElement.style.position='absolute';labelR.domElement.style.top='0';
labelR.domElement.style.pointerEvents='none';
document.getElementById('cv').appendChild(labelR.domElement);

const ctrl=new OrbitControls(camera,renderer.domElement);
ctrl.enableDamping=true;ctrl.dampingFactor=.05;ctrl.minDistance=12;ctrl.maxDistance=260;

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W,H),0.5,0.4,0.85));
composer.addPass(new OutputPass());

scene.add(new THREE.AmbientLight(0x334466,0.7));
const pl1=new THREE.PointLight(0xc5960c,0.5,300);pl1.position.set(0,60,0);scene.add(pl1);

const RR=[0,9,19,29,39,52,66,80];
const meshes=new Map(),labels=new Map(),edges=[];
let selId=null;const catVis={};Object.keys(CAT_COL).forEach(k=>{catVis[k]=true;});

function layout(){
  const rings={};DATA.forEach(n=>{const r=N(n.ring,5);if(!rings[r])rings[r]=[];rings[r].push(n);});
  Object.entries(rings).forEach(([r,arr])=>{
    const rad=RR[r]||80;const off=N(r,0)*0.4;
    arr.forEach((n,i)=>{const a=off+(i/arr.length)*Math.PI*2;const j=(Math.random()-.5)*2;
      n._x=Math.cos(a)*(rad+j);n._y=(Math.random()-.5)*3+(N(n.ring,5)===0?5:0);n._z=Math.sin(a)*(rad+j);});
  });
}

function build(){
  meshes.forEach(m=>scene.remove(m));labels.forEach(l=>scene.remove(l));
  edges.forEach(e=>scene.remove(e.line));meshes.clear();labels.clear();edges.length=0;
  compW();layout();

  DATA.forEach(n=>{
    const fa=N(n.fa,0),cw=N(n.cw,0);
    const r=0.35+(fa>0?0.45*Math.log10(fa+1)/10:0)+cw*0.04;
    const c=new THREE.Color(CAT_COL[S(n.cat)]||'#888');
    const ei=Math.min(0.2+cw*0.035,0.85);
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(Math.min(r,3.5),32,32),
      new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:ei,roughness:0.3,metalness:0.1}));
    mesh.position.set(n._x,n._y,n._z);mesh.userData={id:n.id,d:n};
    scene.add(mesh);meshes.set(n.id,mesh);

    /* CSS2D Label with logo + flag + WHITE name */
    const el=document.createElement('div');el.className='nl';
    const fv=faviUrl(S(n.name));
    const fl=flagUrl(S(n.cc));
    let htm='';
    if(fv) htm+=`<img class="nl-i" src="${fv}" onerror="this.style.display='none'" alt="">`;
    htm+=`<div class="nl-n">${S(n.name)}</div>`;
    if(fl) htm+=`<img class="nl-f" src="${fl}" onerror="this.style.display='none'" alt="">`;
    el.innerHTML=htm;
    const lbl=new CSS2DObject(el);
    lbl.position.set(0,Math.min(r,3.5)+0.8,0);
    mesh.add(lbl);labels.set(n.id,{obj:lbl,el});
  });

  /* Edges */
  const eset=new Set();
  DATA.forEach(n=>{(n.conns||[]).forEach(cid=>{
    const k=[S(n.id),S(cid)].sort().join('|');if(eset.has(k))return;eset.add(k);
    const fm=meshes.get(S(n.id)),tm=meshes.get(S(cid));if(!fm||!tm)return;
    const wA=N(n.cw,1),wB=N((DATA.find(x=>x.id===cid)||{}).cw,1);
    const op=Math.min(Math.max(0.025+(wA+wB)*0.004,0.025),0.14);
    const g=new THREE.BufferGeometry().setFromPoints([fm.position.clone(),tm.position.clone()]);
    const line=new THREE.Line(g,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:op}));
    line.userData={baseOp:op};scene.add(line);edges.push({line,from:S(n.id),to:S(cid)});
  });});

  /* Ring circles */
  RR.forEach(r=>{if(!r)return;const pts=[];
    for(let i=0;i<=80;i++){const a=(i/80)*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*r,-2,Math.sin(a)*r));}
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.02})));
  });

  buildLegend();
  document.getElementById('st').textContent=`${DATA.length} nodes · ${edges.length} connections · ${Object.keys(CAT_COL).length} categories`;
}

/* ═══ LEGEND (no rings section) ═══ */
function buildLegend(){
  const el=document.getElementById('lg');el.innerHTML='';
  const h0=document.createElement('h3');h0.textContent='Categories';el.appendChild(h0);
  Object.entries(CAT_NM).forEach(([k,nm])=>{
    const cnt=DATA.filter(n=>n.cat===k).length;
    const d=document.createElement('div');d.className='li';
    d.innerHTML=`<span class="li-sw" style="background:${CAT_COL[k]}"></span>
      <input type="checkbox" ${catVis[k]?'checked':''} data-cat="${k}">
      <label>${nm} (${cnt})</label>`;
    d.querySelector('input').addEventListener('change',e=>{catVis[k]=e.target.checked;applyFilter();});
    el.appendChild(d);
  });
  const h1=document.createElement('h3');h1.textContent='Node Size';el.appendChild(h1);
  const nt=document.createElement('div');nt.className='lg-note';
  nt.textContent='Sphere size = funding amount (log-scaled) + connection weight. Equal small nodes = connection-only entities with no direct funding recorded.';
  el.appendChild(nt);
}

function applyFilter(){
  meshes.forEach((m,id)=>{const n=DATA.find(x=>x.id===id);m.visible=n?catVis[S(n.cat)]!==false:true;});
  edges.forEach(e=>{const fm=meshes.get(e.from),tm=meshes.get(e.to);e.line.visible=!!(fm&&fm.visible&&tm&&tm.visible);});
}

/* ═══ INTERACTION ═══ */
const rc=new THREE.Raycaster(),mouse=new THREE.Vector2();
const tt=document.getElementById('tt');let hov=null;

function onMM(e){
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  rc.setFromCamera(mouse,camera);
  const arr=[];meshes.forEach(m=>{if(m.visible)arr.push(m);});
  const hits=rc.intersectObjects(arr);
  if(hits.length){const m=hits[0].object;
    if(hov!==m){hov=m;showTT(m.userData.d,e.clientX,e.clientY);}
    else{tt.style.left=Math.min(e.clientX+14,innerWidth-380)+'px';tt.style.top=Math.min(e.clientY+14,innerHeight-220)+'px';}
    document.body.style.cursor='pointer';
  }else{hov=null;tt.style.display='none';document.body.style.cursor='default';}
}

function showTT(d,x,y){
  const money=fmtM(d.fa);const fv=faviUrl(S(d.name));const fl=flagUrl(S(d.cc));
  let h=`<div class="tt-top">`;
  if(fv) h+=`<img class="tt-logo" src="${fv}" onerror="this.style.display='none'" alt="">`;
  h+=`<div class="tt-info"><div class="tt-nm">${S(d.name)}</div>`;
  h+=`<div class="tt-cat">${CAT_NM[S(d.cat)]||S(d.cat)}</div></div></div>`;
  if(fl) h+=`<div class="tt-loc"><img src="${fl}" alt="">${S(d.cc).toUpperCase()} · ${N(d.cw,0)} connections</div>`;
  if(money) h+=`<div class="tt-fund">Funding: ${money}${d.sd?' · '+S(d.sd)+(d.ed?'–'+S(d.ed):'–present'):''}</div>`;
  h+=`<div class="tt-desc">${S(d.desc).substring(0,200)}${S(d.desc).length>200?'…':''}</div>`;
  tt.innerHTML=h;tt.style.display='block';
  tt.style.left=Math.min(x+14,innerWidth-380)+'px';tt.style.top=Math.min(y+14,innerHeight-220)+'px';
}

function onClick(e){
  if(e.target.closest('#lg')||e.target.closest('#tb')||e.target.closest('#sp')||e.target.closest('#mo'))return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  rc.setFromCamera(mouse,camera);
  const arr=[];meshes.forEach(m=>{if(m.visible)arr.push(m);});
  const hits=rc.intersectObjects(arr);
  if(hits.length)selNode(hits[0].object.userData.d,hits[0].object);else desel();
}

function selNode(d,mesh){
  selId=S(d.id);const cs=new Set(d.conns||[]);cs.add(d.id);
  meshes.forEach((m,id)=>{const lb=labels.get(id);
    if(cs.has(id)){m.material.opacity=1;m.material.transparent=false;if(lb)lb.el.classList.remove('dim');}
    else{m.material.opacity=0.08;m.material.transparent=true;if(lb)lb.el.classList.add('dim');}
  });
  edges.forEach(e=>{if(e.from===d.id||e.to===d.id){e.line.material.opacity=0.5;
    e.line.material.color.setHex(new THREE.Color(CAT_COL[S(d.cat)]||'#fff').getHex());
  }else{e.line.material.opacity=0.008;e.line.material.color.setHex(0xffffff);}});
  const t=mesh.position.clone(),dir=camera.position.clone().sub(t).normalize();
  animCam(t.clone().add(dir.multiplyScalar(18)),t);showPanel(d);
}

function desel(){selId=null;
  meshes.forEach((m,id)=>{m.material.opacity=1;m.material.transparent=false;const lb=labels.get(id);if(lb)lb.el.classList.remove('dim');});
  edges.forEach(e=>{e.line.material.opacity=N(e.line.userData.baseOp,0.04);e.line.material.color.setHex(0xffffff);});
  window.closePanel();}

function animCam(dp,dt){
  const sp=camera.position.clone(),st=ctrl.target.clone();
  const dur=700,t0=performance.now();
  function step(t){const p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,3);
    camera.position.lerpVectors(sp,dp,e);ctrl.target.lerpVectors(st,dt,e);ctrl.update();
    if(p<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}

function showPanel(d){
  const money=fmtM(d.fa);const fv=faviUrl(S(d.name));const fl=flagUrl(S(d.cc));
  let h=`<div class="sp-top">`;
  if(fv)h+=`<img class="sp-logo" src="${fv}" onerror="this.style.display='none'" alt="">`;
  h+=`<div><div class="sp-nm">${S(d.name)}</div></div>`;
  if(fl)h+=`<img class="sp-flag" src="${fl}" alt="">`;
  h+=`</div>`;
  h+=`<div class="sp-cat">${CAT_NM[S(d.cat)]||S(d.cat)}</div>`;
  if(money)h+=`<div class="sp-sec">Funding</div><div class="sp-val">${money}</div>`;
  if(d.sd||d.ed)h+=`<div class="sp-sec">Period</div><div class="sp-val">${S(d.sd)||'?'} → ${S(d.ed)||'present'}</div>`;
  h+=`<div class="sp-sec">Connections</div><div class="sp-val">${N(d.cw,0)} connections</div>`;
  h+=`<div class="sp-sec">Intelligence</div><div class="sp-txt">${S(d.desc)}</div>`;
  if(d.conns&&d.conns.length){h+=`<div class="sp-sec">Connected To (${d.conns.length})</div>`;
    d.conns.forEach(cid=>{const cn=DATA.find(n=>n.id===cid);
      if(cn)h+=`<div class="sp-conn" onclick="window._sel('${S(cid)}')">${S(cn.name)}</div>`;});}
  document.getElementById('spc').innerHTML=h;document.getElementById('sp').classList.add('open');
}

window._sel=id=>{const d=DATA.find(n=>n.id===id),m=meshes.get(id);if(d&&m)selNode(d,m);};
window.closePanel=()=>document.getElementById('sp').classList.remove('open');

/* ═══ TOOLBAR ═══ */
window.doExport=()=>{const mo=document.getElementById('mo'),mb=document.getElementById('mb');
  mb.innerHTML=`<h3>Export Network JSON</h3><textarea id="etx" readonly>${JSON.stringify(DATA,null,2)}</textarea>
    <div class="mb-b"><button onclick="navigator.clipboard.writeText(document.getElementById('etx').value);this.textContent='Copied!'">Copy</button>
    <button onclick="document.getElementById('mo').classList.remove('show')">Close</button></div>`;mo.classList.add('show');};
window.doImport=()=>{const mo=document.getElementById('mo'),mb=document.getElementById('mb');
  mb.innerHTML=`<h3>Import Network JSON</h3><textarea id="itx" placeholder="Paste JSON array..."></textarea>
    <div class="mb-b"><button class="pr" onclick="impData()">Import</button>
    <button onclick="document.getElementById('mo').classList.remove('show')">Cancel</button></div>`;mo.classList.add('show');};
window.impData=()=>{try{const d=JSON.parse(document.getElementById('itx').value);
  if(Array.isArray(d)){DATA.length=0;d.forEach(x=>DATA.push(x));desel();build();document.getElementById('mo').classList.remove('show');}
}catch(e){alert('Invalid JSON: '+e.message);}};
window.doReset=()=>{desel();animCam(new THREE.Vector3(0,45,100),new THREE.Vector3(0,0,0));};

/* ═══ ANIMATE ═══ */
let t=0;
function animate(){
  requestAnimationFrame(animate);t+=0.003;
  meshes.forEach((m,id)=>{const d=m.userData.d;if(d)m.position.y=d._y+Math.sin(t+d._x*0.3)*0.3;});
  edges.forEach(e=>{const fm=meshes.get(e.from),tm=meshes.get(e.to);
    if(fm&&tm){const p=e.line.geometry.attributes.position.array;
      p[0]=fm.position.x;p[1]=fm.position.y;p[2]=fm.position.z;
      p[3]=tm.position.x;p[4]=tm.position.y;p[5]=tm.position.z;
      e.line.geometry.attributes.position.needsUpdate=true;}});
  if(!selId){labels.forEach((lb,id)=>{const m=meshes.get(id);if(!m||!m.visible)return;
    const d=camera.position.distanceTo(m.position);
    const fs=Math.max(7,Math.min(11,11-(d-20)/15));
    const op=Math.max(0.08,Math.min(1,1-(d-30)/80));
    const nn=lb.el.querySelector('.nl-n');if(nn)nn.style.fontSize=fs+'px';
    lb.el.style.opacity=String(op);});}
  ctrl.update();composer.render();labelR.render(scene,camera);
}

addEventListener('mousemove',onMM);addEventListener('click',onClick);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);labelR.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);});
build();animate();
</script>
